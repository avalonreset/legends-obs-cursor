name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tools\validate_package.ps1

